<title id="title">Yash Kanadhia Minimal AlienTech static GitHub hero</title>
<desc id="desc">High-resolution static profile banner for Yash Kanadhia, Product Designer in Toronto. It features Zeref, PerFin OS, three dated GitHub evidence signals, and a product delivery tool rail with Full Stack.</desc>
