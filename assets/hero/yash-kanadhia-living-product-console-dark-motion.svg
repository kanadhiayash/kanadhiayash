<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Yash Kanadhia Minimal Samurai Light profile hero</title>
<desc id="desc">Yash Kanadhia, Product Designer in Toronto, Ontario, Canada. I design and build systems that connect people to outcomes. Metrics: 2 Ready to Ship Projects, 1 Team Project, 5 Certificates. Zeref and PerFin OS evidence panels. Tools: Figma, Linear, Notion, React, SwiftUI, Firebase, Claude, Codex, and GitHub.</desc>
<defs>
  <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FBF8F2"/><stop offset="1" stop-color="#F4EFE7"/></linearGradient>
  <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#B7B3AD" stop-opacity=".55"/><stop offset="1" stop-color="#D8D4CD" stop-opacity=".08"/></linearGradient>
  <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
  <style>
    :root{--bg:#F8F6F1;--panel:#FCFAF6;--text:#1C1B18;--muted:#59534D;--line:#D4CBC0;--accent:#A6322D;--olive:#4A5240}
    @media (prefers-color-scheme: light){:root{--bg:#F8F6F1;--panel:#FCFAF6;--text:#1C1B18;--muted:#59534D;--line:#D4CBC0;--accent:#A6322D;--olive:#4A5240}}
    .sans{font-family:Inter,Arial,sans-serif}.serif{font-family:Georgia,'Times New Roman',serif}.mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace}
    .petal-a{animation:petalA 22s linear infinite}.petal-b{animation:petalB 27s linear 5s infinite}.petal-c{animation:petalC 31s linear 11s infinite}.cursor{animation:blink 2.4s step-end infinite}.mist{animation:mist 18s ease-in-out infinite}
    @keyframes petalA{0%{transform:translate(-80px,-30px) rotate(0)}100%{transform:translate(1700px,470px) rotate(500deg)}}
    @keyframes petalB{0%{transform:translate(1420px,-70px) rotate(0)}100%{transform:translate(-220px,640px) rotate(-420deg)}}
    @keyframes petalC{0%{transform:translate(540px,-80px) rotate(0)}100%{transform:translate(1170px,930px) rotate(380deg)}}
    @keyframes blink{0%,48%{opacity:1}49%,100%{opacity:.15}}@keyframes mist{0%,100%{opacity:.42;transform:translateX(0)}50%{opacity:.58;transform:translateX(22px)}}
    @media (prefers-reduced-motion: reduce){.petal-a,.petal-b,.petal-c,.cursor,.mist{animation:none!important}}
  </style>
</defs>
<rect width="1600" height="900" fill="url(#paper)"/>
<rect x="1" y="1" width="1598" height="898" fill="none" stroke="#CEC5BA"/>
<g class="mist" opacity=".46">
  <path d="M0 674C118 566 205 568 285 650c55-90 119-121 190-68 73-134 170-142 257 15 66-71 126-64 194 17 67-40 124-31 189 39H0Z" fill="url(#mist)"/>
  <path d="M0 742C153 640 274 646 389 720c88-109 182-111 271-13 92-72 185-61 273 23 78-49 158-35 247 26H0Z" fill="#C9C5BE" opacity=".25"/>
</g>
<path d="M0 805c102-31 222-17 330-56 111-40 188-125 287-110 82 13 136 94 238 88 88-5 176-69 260-48 86 22 152 111 269 79 78-21 137-88 216-91v138H0Z" fill="#E4E0D9" opacity=".7"/>
<path d="M1210 900c130-35 245-115 390-244v244Z" fill="#111" opacity=".84"/>
<path d="M1255 900c89-43 181-112 345-214" fill="none" stroke="#F8F6F1" stroke-width="19" stroke-linecap="round" opacity=".8"/>
<path d="M1330 900c69-35 154-96 270-171" fill="none" stroke="#F8F6F1" stroke-width="8" stroke-linecap="round" opacity=".65"/>
<g transform="translate(76 120)">
  <text x="0" y="80" class="sans" font-size="72" font-weight="650" fill="var(--text)">Yash Kanadhia</text>
  <text x="4" y="145" class="sans" font-size="24" letter-spacing="8" fill="var(--accent)">PRODUCT DESIGNER</text>
  <g transform="translate(2 190)"><path d="M13 0C6 0 1 5 1 12c0 9 12 22 12 22s12-13 12-22C25 5 20 0 13 0Zm0 17a5 5 0 1 1 0-10 5 5 0 0 1 0 10Z" fill="var(--accent)"/><text x="38" y="25" class="sans" font-size="25" fill="var(--text)">Toronto, Ontario, Canada</text></g>
  <rect x="2" y="264" width="72" height="3" fill="var(--accent)"/>
  <text x="2" y="326" class="sans" font-size="29" fill="var(--text)">I design and build systems that</text>
  <text x="2" y="369" class="sans" font-size="29" fill="var(--text)">connect people to outcomes.</text>
</g>
<g transform="translate(648 185)">
  <rect width="370" height="270" rx="16" fill="var(--panel)" stroke="var(--line)"/>
  <text x="28" y="43" class="mono" font-size="18" fill="var(--text)">// ZEREF</text><circle cx="330" cy="36" r="10" fill="none" stroke="var(--olive)"/><path d="M330 18v36M312 36h36" stroke="var(--olive)"/>
  <line x1="24" y1="62" x2="346" y2="62" stroke="var(--line)"/>
  <rect x="25" y="86" width="3" height="142" rx="1.5" fill="var(--accent)"/>
  <text x="50" y="103" class="mono" font-size="17" fill="var(--text)">zeref = {</text>
  <text x="68" y="137" class="mono" font-size="16" fill="var(--text)">purpose: <tspan fill="var(--accent)">"AI memory layer"</tspan>,</text>
  <text x="68" y="170" class="mono" font-size="16" fill="var(--text)">privacy: <tspan fill="var(--accent)">"local-first"</tspan>,</text>
  <text x="68" y="203" class="mono" font-size="16" fill="var(--text)">control: <tspan fill="var(--accent)">"user-owned"</tspan>,</text>
  <text x="68" y="236" class="mono" font-size="16" fill="var(--text)">evidence: <tspan fill="var(--accent)">"verifiable"</tspan></text>
  <text x="50" y="258" class="mono" font-size="17" fill="var(--text)">}<tspan class="cursor" fill="var(--accent)">_</tspan></text>
</g>
<g transform="translate(1040 185)">
  <rect width="370" height="270" rx="16" fill="var(--panel)" stroke="var(--line)"/>
  <text x="28" y="43" class="mono" font-size="18" fill="var(--text)">// PERFIN OS</text><circle cx="330" cy="36" r="12" fill="none" stroke="var(--olive)"/><circle cx="330" cy="36" r="4" fill="var(--olive)"/>
  <line x1="24" y1="62" x2="346" y2="62" stroke="var(--line)"/>
  <rect x="25" y="86" width="3" height="142" rx="1.5" fill="var(--text)"/>
  <text x="50" y="103" class="mono" font-size="17" fill="var(--text)">perfinOS = {</text>
  <text x="68" y="137" class="mono" font-size="16" fill="var(--text)">type: <tspan fill="var(--accent)">"personal finance OS"</tspan>,</text>
  <text x="68" y="170" class="mono" font-size="16" fill="var(--text)">role: <tspan fill="var(--accent)">"co-creator"</tspan>,</text>
  <text x="68" y="203" class="mono" font-size="16" fill="var(--text)">focus: <tspan fill="var(--accent)">"clarity, control"</tspan>,</text>
  <text x="68" y="236" class="mono" font-size="16" fill="var(--text)">status: <tspan fill="var(--accent)">"ship-ready"</tspan></text>
  <text x="50" y="258" class="mono" font-size="17" fill="var(--text)">}</text>
</g>
<g transform="translate(648 488)">
  <rect width="762" height="118" rx="16" fill="var(--panel)" stroke="var(--line)"/>
  <g transform="translate(38 29)"><circle cx="28" cy="28" r="27" fill="none" stroke="var(--text)" stroke-width="2"/><path d="m19 36 9-24 9 24-9-7Z" fill="none" stroke="var(--accent)" stroke-width="2"/><text x="72" y="42" class="sans" font-size="23" fill="var(--text)"><tspan font-size="42" fill="var(--accent)">2</tspan> Ready to Ship Projects</text></g>
  <line x1="285" y1="22" x2="285" y2="96" stroke="var(--line)"/>
  <g transform="translate(320 29)"><circle cx="21" cy="21" r="9" fill="none" stroke="var(--text)"/><circle cx="44" cy="21" r="9" fill="none" stroke="var(--text)"/><path d="M7 55c2-15 11-22 25-22s23 7 25 22" fill="none" stroke="var(--text)"/><text x="76" y="42" class="sans" font-size="23" fill="var(--text)"><tspan font-size="42" fill="var(--accent)">1</tspan> Team Project</text></g>
  <line x1="540" y1="22" x2="540" y2="96" stroke="var(--line)"/>
  <g transform="translate(573 29)"><circle cx="28" cy="28" r="24" fill="none" stroke="var(--text)"/><path d="m18 29 8 8 14-18" fill="none" stroke="var(--accent)" stroke-width="3"/><text x="66" y="42" class="sans" font-size="23" fill="var(--text)"><tspan font-size="42" fill="var(--accent)">5</tspan> Certificates</text></g>
</g>
<g transform="translate(1492 78)"><text x="0" y="0" writing-mode="tb" glyph-orientation-vertical="0" class="serif" font-size="28" fill="var(--text)">改善・構築・守る</text><rect x="-3" y="280" width="38" height="38" fill="none" stroke="var(--accent)" stroke-width="2"/><text x="16" y="306" text-anchor="middle" class="sans" font-size="13" font-weight="700" fill="var(--accent)">YK</text></g>
<g transform="translate(42 786)">
  <rect width="1516" height="82" rx="16" fill="var(--panel)" stroke="var(--line)"/>
  <g class="sans" font-size="16" fill="var(--text)">
    <text x="66" y="50">◉ Figma</text><text x="226" y="50">◉ Linear</text><text x="382" y="50">▣ Notion</text><text x="540" y="50">◎ React</text><text x="696" y="50">◆ SwiftUI</text><text x="858" y="50">△ Firebase</text><text x="1020" y="50">✳ Claude</text><text x="1180" y="50">⬡ Codex</text><text x="1340" y="50">● GitHub</text>
  </g>
</g>
<g fill="#E6A6A2" opacity=".72"><ellipse class="petal-a" cx="0" cy="0" rx="10" ry="5" transform="rotate(18)"/><ellipse class="petal-b" cx="0" cy="0" rx="9" ry="5" transform="rotate(-20)"/><ellipse class="petal-c" cx="0" cy="0" rx="11" ry="5" transform="rotate(30)"/></g>
</svg>