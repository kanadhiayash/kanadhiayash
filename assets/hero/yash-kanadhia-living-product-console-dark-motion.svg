<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
<title id="title">Yash Kanadhia minimal samurai systems profile hero with adaptive light and dark modes</title>
<desc id="desc">Yash Kanadhia, Product Designer in Toronto, Ontario, Canada. I design and build systems that connect people to outcomes. Metrics: 2 Ready to Ship Projects, 1 Team Project, 5 Certificates. Zeref Memory Engine and PerFin OS code panels. Tools: Figma, Linear, Notion, React, SwiftUI, Firebase, Claude, Codex, and GitHub.</desc>
<defs>
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="var(--line)" stroke-opacity=".11" /></pattern>
  <radialGradient id="wash"><stop offset="0" stop-color="#B13A32" stop-opacity=".18"/><stop offset="1" stop-color="#B13A32" stop-opacity="0"/></radialGradient>
  <style>
    :root{--bg:#090909;--panel:#111111;--text:#F0E7DA;--muted:#C5B8AA;--line:#5E5147;--soft:#201B18;--codebg:#0D0D0D;--logo:#EADFD1}
    @media (prefers-color-scheme: light){:root{--bg:#F7F3EC;--panel:#FFFDFC;--text:#252321;--muted:#665F58;--line:#CFC5B9;--soft:#EEE7DE;--codebg:#FBF8F3;--logo:#2F2C29}}
    .serif{font-family:Georgia,'Times New Roman',serif}
    .sans{font-family:Inter,Arial,sans-serif}
    .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace}
    .petal1{animation:drift1 18s linear infinite}
    .petal2{animation:drift2 22s linear 3s infinite}
    .petal3{animation:drift3 26s linear 8s infinite}
    .glow{animation:pulse 10s ease-in-out infinite}
    @keyframes drift1{0%{transform:translate(-60px,-40px) rotate(0)}100%{transform:translate(1710px,520px) rotate(420deg)}}
    @keyframes drift2{0%{transform:translate(1300px,-70px) rotate(0)}100%{transform:translate(-200px,600px) rotate(-360deg)}}
    @keyframes drift3{0%{transform:translate(450px,-80px) rotate(0)}100%{transform:translate(1150px,760px) rotate(300deg)}}
    @keyframes pulse{0%,100%{opacity:.12}50%{opacity:.25}}
    @media (prefers-reduced-motion: reduce){.petal1,.petal2,.petal3,.glow{animation:none!important}}
  </style>
</defs>
