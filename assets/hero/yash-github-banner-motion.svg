<g class="txt"><text x="930" y="485" text-anchor="middle" font-size="92" font-weight="650" letter-spacing="13">YASH KANADHIA</text><text x="930" y="575" text-anchor="middle" font-size="46" font-weight="500" letter-spacing="18" class="accent">PRODUCT DESIGNER</text><g transform="translate(690 626)"><path d="M18 0c-20 0-36 16-36 36 0 28 36 62 36 62s36-34 36-62C54 16 38 0 18 0zm0 50a14 14 0 1 1 0-28 14 14 0 0 1 0 28z" transform="scale(.45)" fill="#5f934d"/><text x="50" y="25" font-size="31" letter-spacing="3" class="muted">Toronto, Ontario, Canada</text></g><line x1="640" y1="705" x2="1220" y2="705" class="hair"/><circle cx="930" cy="705" r="7" fill="#6aa04f"/><text x="930" y="795" text-anchor="middle" font-size="31" font-weight="520" letter-spacing="8">AI PRODUCTS · MOBILE PRODUCTS</text><text x="930" y="850" text-anchor="middle" font-size="31" font-weight="520" letter-spacing="8">UX SYSTEMS · WORKING PROTOTYPES</text><g fill="#5f934d"><circle cx="900" cy="912" r="4"/><circle cx="920" cy="912" r="4"/><circle cx="940" cy="912" r="4"/><circle cx="960" cy="912" r="4"/></g><text x="930" y="1015" text-anchor="middle" font-size="38" font-weight="430">I design and build systems</text><text x="930" y="1074" text-anchor="middle" font-size="38" font-weight="430">that connect people to outcomes.</text></g>
