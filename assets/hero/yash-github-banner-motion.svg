<style>
.txt{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111d18}.mono{font-family:"JetBrains Mono","SFMono-Regular",Consolas,monospace}.muted{fill:#435047}.accent{fill:#4f7d42}.line{stroke:#8ca588;stroke-width:2;fill:none}.hair{stroke:#aebdac;stroke-width:1.5;fill:none}.card{fill:#fff;fill-opacity:.74;stroke:#9fb69b;stroke-width:2}.orbit{fill:none;stroke:#7fa174;stroke-width:2;opacity:.22;transform-box:fill-box;transform-origin:center}.o1{stroke-dasharray:4 26 2 42;animation:rot 28s linear infinite,breath 8s ease-in-out infinite}.o2{stroke-dasharray:2 34 8 58;animation:rotBack 36s linear infinite,breath 11s ease-in-out infinite reverse}.o3{stroke-dasharray:84 26 4 34;animation:dash 18s linear infinite,breath 13s ease-in-out infinite}.core{transform-box:fill-box;transform-origin:center;animation:pulse 4.8s ease-in-out infinite}.node{animation:node 3.3s ease-in-out infinite}.n2{animation-delay:-1.1s}.n3{animation-delay:-2.1s}.n4{animation-delay:-.45s}.borderLive{fill:none;stroke:#77b95a;stroke-width:3;opacity:.05;animation:border 7s ease-in-out infinite}.borderLive.b2{animation-delay:-3.2s}.sweep{animation:sweep 10s cubic-bezier(.45,0,.55,1) infinite}.sweep.b2{animation-delay:-4.7s}.railSweep{animation:rail 13s cubic-bezier(.45,0,.55,1) infinite}.blink{animation:blink 1.2s steps(2,end) infinite}.twinkle{animation:twinkle 5.5s ease-in-out infinite}.t2{animation-delay:-1.8s}.t3{animation-delay:-3.7s}@keyframes rot{to{transform:rotate(360deg)}}@keyframes rotBack{to{transform:rotate(-360deg)}}@keyframes dash{to{stroke-dashoffset:-430}}@keyframes breath{0%,100%{opacity:.1}50%{opacity:.34}}@keyframes pulse{0%,100%{transform:scale(.9);opacity:.38}45%{transform:scale(1.16);opacity:.8}60%{transform:scale(1.04);opacity:.6}}@keyframes node{0%,100%{opacity:.2}50%{opacity:.95}}@keyframes border{0%,100%{opacity:.04}50%{opacity:.3}}@keyframes sweep{0%,18%{transform:translateX(-1800px);opacity:0}28%{opacity:.58}48%{transform:translateX(1750px);opacity:.3}58%,100%{transform:translateX(1750px);opacity:0}}@keyframes rail{0%,16%{transform:translateX(-3000px);opacity:0}25%{opacity:.5}55%{transform:translateX(3200px);opacity:.25}65%,100%{transform:translateX(3200px);opacity:0}}@keyframes blink{0%,42%{opacity:.8}43%,100%{opacity:.08}}@keyframes twinkle{0%,100%{opacity:.08;transform:scale(.7)}50%{opacity:.7;transform:scale(1.25)}}@media(prefers-reduced-motion:reduce){.o1,.o2,.o3,.core,.node,.borderLive,.sweep,.railSweep,.blink,.twinkle{animation:none!important}.o1,.o2,.o3{opacity:.14}.core{opacity:.3}.sweep,.railSweep,.twinkle{display:none}}
</style>
