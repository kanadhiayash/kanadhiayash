<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1800" viewBox="0 0 3200 1800" role="img" aria-labelledby="title desc">
<title id="title">Yash Kanadhia Product Designer animated GitHub banner</title>
<desc id="desc">Minimal light AlienTech banner with orbital motion, living project cards, capability modules, and a calm animated tool rail. Motion reduces automatically when the user prefers reduced motion.</desc>
<defs>
