<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3200 1400" width="3200" height="1400">
  <defs>
    <style>
      text { font-family: Inter, Satoshi, 'IBM Plex Sans', Arial, sans-serif; dominant-baseline: auto; }
      .label { letter-spacing: 4px; text-transform: uppercase; }
      .mono { font-family: 'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace; }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171A1B"/>
      <stop offset="0.38" stop-color="#24292B"/>
      <stop offset="0.72" stop-color="#2B3033"/>
      <stop offset="1" stop-color="#3E4639"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F0ECE3" stop-opacity="0.48"/>
      <stop offset="0.35" stop-color="#E6EBDD" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2B3033" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oliveGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6B745E" stop-opacity="0.55"/>
      <stop offset="0.42" stop-color="#4A5240" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#2B3033" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crimsonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7B1D2C" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#7B1D2C" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#2B3033" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="0.46" stop-color="#FFFFFF" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#E6EBDD" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.58" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#4A5240" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="edgeShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="blurXL" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="145"/>
    </filter>
    <filter id="blurM" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="58"/>
    </filter>
    <filter id="glassShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="36" stdDeviation="46" flood-color="#000000" flood-opacity="0.42"/>
      <feDropShadow dx="0" dy="1" stdDeviation="0.6" flood-color="#FFFFFF" flood-opacity="0.22"/>
    </filter>
    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="microGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotGrid" width="56" height="56" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#F8F6F1" opacity="0.12"/>
    </pattern>
    <pattern id="fineNoise" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="transparent"/>
      <circle cx="8" cy="18" r="1" fill="#FFFFFF" opacity="0.030"/>
      <circle cx="42" cy="6" r="1" fill="#FFFFFF" opacity="0.035"/>
      <circle cx="73" cy="41" r="1" fill="#FFFFFF" opacity="0.028"/>
      <circle cx="28" cy="82" r="1" fill="#FFFFFF" opacity="0.030"/>
      <circle cx="88" cy="91" r="1" fill="#FFFFFF" opacity="0.024"/>
    </pattern>
  </defs>

  <rect width="3200" height="1400" fill="url(#bg)"/>
  <rect width="3200" height="1400" fill="url(#fineNoise)" opacity="0.9"/>
  <circle cx="2710" cy="120" r="720" fill="url(#oliveGlow)" filter="url(#blurXL)"/>
  <circle cx="2330" cy="1120" r="620" fill="url(#warmGlow)" filter="url(#blurXL)" opacity="0.72"/>
  <circle cx="3180" cy="1135" r="520" fill="url(#crimsonGlow)" filter="url(#blurXL)" opacity="0.82"/>
  <circle cx="260" cy="1160" r="470" fill="url(#oliveGlow)" filter="url(#blurXL)" opacity="0.34"/>
  <rect width="3200" height="1400" fill="url(#dotGrid)" opacity="0.42"/>

  <!-- restrained orbital technology motif -->
  <g opacity="0.32">
    <circle cx="815" cy="1030" r="262" stroke="#F8F6F1" stroke-width="1.8" fill="none" opacity="0.18"/>
    <circle cx="815" cy="1030" r="412" stroke="#6B745E" stroke-width="1.8" fill="none" stroke-dasharray="11 21" opacity="0.42"/>
    <circle cx="815" cy="1030" r="570" stroke="#F0ECE3" stroke-width="1" fill="none" opacity="0.12"/>
    <path d="M815 618 C1260 544 1355 326 1695 348" stroke="#E6EBDD" stroke-width="2.4" fill="none" opacity="0.24"/>
    <path d="M815 1030 C1230 870 1375 986 1632 804" stroke="#6B745E" stroke-width="2.8" fill="none" opacity="0.34"/>
    <circle cx="815" cy="618" r="9" fill="#E6EBDD" opacity="0.85" filter="url(#microGlow)"/>
    <circle cx="1695" cy="348" r="8" fill="#7B1D2C" opacity="0.88" filter="url(#microGlow)"/>
    <circle cx="1632" cy="804" r="9" fill="#6B745E" opacity="0.92" filter="url(#microGlow)"/>
  </g>

  <!-- Left copy block, export safe area honored at double resolution -->
  <text x="360" y="306" class="label" font-size="32" font-weight="650" fill="#B9B5AC">GITHUB PROFILE README</text>
  <text x="360" y="500" font-size="120" font-weight="770" fill="#F8F6F1">Product systems</text>
  <text x="360" y="632" font-size="120" font-weight="770" fill="#F8F6F1">that ship</text>

  <text x="360" y="755" font-size="48" font-weight="400" fill="#DDD8CE">Design, build, document, and maintain product systems</text>
  <text x="360" y="823" font-size="48" font-weight="400" fill="#DDD8CE">across web, mobile, and workflow platforms.</text>

  <g>
    <rect x="360" y="928" width="220" height="76" rx="38" fill="#FFFFFF" fill-opacity="0.11" stroke="#F8F6F1" stroke-opacity="0.22" stroke-width="2"/>
    <text x="470" y="978" font-size="34" font-weight="630" fill="#F0ECE3" text-anchor="middle">Zeref OS</text>
    <rect x="608" y="928" width="308" height="76" rx="38" fill="#FFFFFF" fill-opacity="0.11" stroke="#F8F6F1" stroke-opacity="0.22" stroke-width="2"/>
    <text x="762" y="978" font-size="34" font-weight="630" fill="#F0ECE3" text-anchor="middle">StreamNexus</text>
    <rect x="944" y="928" width="250" height="76" rx="38" fill="#FFFFFF" fill-opacity="0.11" stroke="#F8F6F1" stroke-opacity="0.22" stroke-width="2"/>
    <text x="1069" y="978" font-size="34" font-weight="630" fill="#F0ECE3" text-anchor="middle">FourRent</text>
    <rect x="1222" y="928" width="250" height="76" rx="38" fill="#FFFFFF" fill-opacity="0.11" stroke="#F8F6F1" stroke-opacity="0.22" stroke-width="2"/>
    <text x="1347" y="978" font-size="34" font-weight="630" fill="#F0ECE3" text-anchor="middle">PerFin OS</text>
  </g>

  <text x="360" y="1132" font-size="39" font-weight="650" fill="#F8F6F1">Yash Kanadhia</text>
  <text x="674" y="1132" font-size="39" font-weight="400" fill="#B9B5AC">· Product &amp; UX Systems Designer · Toronto</text>

  <!-- Right-side Apple-like glass product-system visual -->
  <g transform="translate(1882 172)">
    <rect x="0" y="0" width="930" height="982" rx="66" fill="url(#glassFill)" stroke="#FFFFFF" stroke-opacity="0.26" stroke-width="2" filter="url(#glassShadow)"/>
    <path d="M66 2 H864" stroke="url(#edgeShine)" stroke-width="3" stroke-linecap="round" opacity="0.76"/>
    <path d="M2 96 V890" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="2" stroke-linecap="round"/>

    <!-- top nav glass strip -->
    <rect x="72" y="68" width="786" height="112" rx="34" fill="url(#panelFill)" stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="2"/>
    <circle cx="122" cy="124" r="14" fill="#7B1D2C" opacity="0.88"/>
    <circle cx="166" cy="124" r="14" fill="#6B745E" opacity="0.92"/>
    <circle cx="210" cy="124" r="14" fill="#F0ECE3" opacity="0.74"/>
    <text x="268" y="114" font-size="25" font-weight="650" fill="#F8F6F1">System canvas</text>
    <text x="268" y="150" font-size="22" font-weight="400" fill="#B9B5AC">tokens · components · docs · release</text>

    <!-- central stacked frosted windows -->
    <rect x="72" y="232" width="368" height="238" rx="38" fill="#FFFFFF" fill-opacity="0.105" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2" filter="url(#softShadow)"/>
    <text x="116" y="300" font-size="26" font-weight="700" fill="#F8F6F1">Tokens</text>
    <text x="116" y="342" font-size="22" font-weight="400" fill="#B9B5AC">color, type, spacing</text>
    <rect x="116" y="390" width="230" height="17" rx="8.5" fill="#E6EBDD" opacity="0.58"/>
    <rect x="116" y="426" width="152" height="17" rx="8.5" fill="#6B745E" opacity="0.62"/>

    <rect x="496" y="232" width="362" height="238" rx="38" fill="#FFFFFF" fill-opacity="0.095" stroke="#FFFFFF" stroke-opacity="0.17" stroke-width="2" filter="url(#softShadow)"/>
    <text x="540" y="300" font-size="26" font-weight="700" fill="#F8F6F1">Components</text>
    <text x="540" y="342" font-size="22" font-weight="400" fill="#B9B5AC">states and variants</text>
    <rect x="540" y="386" width="94" height="64" rx="20" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <rect x="656" y="386" width="94" height="64" rx="20" fill="#4A5240" fill-opacity="0.44" stroke="#E6EBDD" stroke-opacity="0.20"/>
    <rect x="772" y="386" width="46" height="64" rx="20" fill="#7B1D2C" fill-opacity="0.34" stroke="#FFFFFF" stroke-opacity="0.12"/>

    <rect x="72" y="524" width="786" height="264" rx="46" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2" filter="url(#softShadow)"/>
    <text x="116" y="594" font-size="27" font-weight="700" fill="#F8F6F1">Product system loop</text>
    <text x="116" y="636" font-size="22" font-weight="400" fill="#B9B5AC">design → build → document → maintain</text>

    <!-- curved tech line, but restrained -->
    <path d="M126 714 C238 628 348 812 475 708 S681 626 802 712" stroke="#E6EBDD" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.42"/>
    <path d="M126 714 C238 628 348 812 475 708 S681 626 802 712" stroke="#6B745E" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.78"/>
    <circle cx="126" cy="714" r="18" fill="#E6EBDD" opacity="0.90" filter="url(#microGlow)"/>
    <circle cx="475" cy="708" r="18" fill="#7B1D2C" opacity="0.86" filter="url(#microGlow)"/>
    <circle cx="802" cy="712" r="18" fill="#6B745E" opacity="0.92" filter="url(#microGlow)"/>

    <!-- floating glass chips -->
    <g opacity="0.92">
      <rect x="178" y="848" width="164" height="54" rx="27" fill="#FFFFFF" fill-opacity="0.11" stroke="#FFFFFF" stroke-opacity="0.18"/>
      <text x="260" y="883" font-size="19" font-weight="650" fill="#E6EBDD" text-anchor="middle">README.md</text>
      <rect x="374" y="848" width="142" height="54" rx="27" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.17"/>
      <text x="445" y="883" font-size="19" font-weight="650" fill="#E6EBDD" text-anchor="middle">docs</text>
      <rect x="548" y="848" width="148" height="54" rx="27" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.17"/>
      <text x="622" y="883" font-size="19" font-weight="650" fill="#E6EBDD" text-anchor="middle">ship</text>
    </g>
  </g>

  <!-- foreground glass highlights for dimensionality -->
  <g opacity="0.38">
    <rect x="2520" y="128" width="238" height="86" rx="43" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.18" filter="url(#softShadow)"/>
    <rect x="1746" y="1052" width="238" height="86" rx="43" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14" filter="url(#softShadow)"/>
    <circle cx="2940" cy="875" r="54" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.14" filter="url(#softShadow)"/>
  </g>

  <text x="3168" y="1378" font-size="18" font-weight="500" fill="#2B3033" opacity="0.10">yash kanadhia · product systems · ux systems · toronto</text>
</svg>