<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">Flagship systems by Yash Kanadhia</title>
  <desc id="desc">A dark editorial project board presenting Zeref Memory Engine as an independent project and PerFin OS as a MADS final team project by Yash Kanadhia, Alexis Gorospe, and Sarmad Tariq.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080A0C"/>
      <stop offset="1" stop-color="#111418"/>
    </linearGradient>
    <linearGradient id="zeref" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141712"/>
      <stop offset="1" stop-color="#20261A"/>
    </linearGradient>
    <linearGradient id="perfin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171315"/>
      <stop offset="1" stop-color="#251719"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#FFFFFF" stroke-opacity="0.025"/>
    </pattern>
    <style>
      .eyebrow{font:600 22px Arial,sans-serif;letter-spacing:3px;text-transform:uppercase}
      .title{font:700 54px Georgia,serif;fill:#F5F2EA}
      .cardTitle{font:700 42px Georgia,serif;fill:#F5F2EA}
      .body{font:400 24px Arial,sans-serif;fill:#C9C8C2}
      .small{font:500 19px Arial,sans-serif;fill:#9FA29A}
      .pill{font:600 18px Arial,sans-serif}
      .metric{font:600 22px Arial,sans-serif;fill:#E8E6DF}
    </style>
  </defs>
  <rect width="1600" height="760" rx="34" fill="url(#bg)"/>
  <rect width="1600" height="760" rx="34" fill="url(#grid)"/>
  <rect x="18" y="18" width="1564" height="724" rx="28" fill="none" stroke="#73756F" stroke-opacity="0.42"/>

  <text x="86" y="92" class="eyebrow" fill="#A8AC58">Living Product Console</text>
  <text x="86" y="154" class="title">Flagship systems</text>
  <text x="86" y="194" class="small">Evidence-backed summaries. Static SVG media. No fabricated screenshots.</text>

  <g filter="url(#shadow)">
    <rect x="86" y="242" width="680" height="410" rx="28" fill="url(#zeref)" stroke="#A8AC58" stroke-opacity="0.65"/>
    <rect x="834" y="242" width="680" height="410" rx="28" fill="url(#perfin)" stroke="#D94B4B" stroke-opacity="0.65"/>
  </g>

  <g>
    <circle cx="144" cy="306" r="24" fill="#A8AC58" fill-opacity="0.16" stroke="#A8AC58"/>
    <path d="M132 306l12-12 12 12-12 12zM144 286v40M124 306h40" fill="none" stroke="#DDE18B" stroke-width="2"/>
    <rect x="564" y="277" width="150" height="42" rx="21" fill="#A8AC58" fill-opacity="0.12" stroke="#A8AC58" stroke-opacity="0.8"/>
    <circle cx="588" cy="298" r="6" fill="#A8AC58"/>
    <text x="605" y="305" class="pill" fill="#DDE18B">Independent</text>
    <text x="126" y="372" class="cardTitle">Zeref Memory Engine</text>
    <rect x="126" y="397" width="68" height="5" rx="2.5" fill="#A8AC58"/>
    <text x="126" y="450" class="body">Local-first memory and context infrastructure</text>
    <text x="126" y="484" class="body">for AI-assisted project work.</text>
    <text x="126" y="532" class="small">• Structured memory and guarded writes</text>
    <text x="126" y="564" class="small">• Cross-harness handoffs and privacy controls</text>
    <text x="126" y="596" class="small">• Deterministic evaluation and release gates</text>
    <text x="126" y="628" class="small">• Facts, assumptions, unknowns, and risks separated</text>
  </g>

  <g>
    <circle cx="892" cy="306" r="24" fill="#D94B4B" fill-opacity="0.14" stroke="#D94B4B"/>
    <circle cx="892" cy="306" r="10" fill="none" stroke="#FF7770" stroke-width="2"/>
    <circle cx="892" cy="306" r="4" fill="#FF5A52"/>
    <rect x="1295" y="277" width="174" height="42" rx="21" fill="#D94B4B" fill-opacity="0.11" stroke="#D94B4B" stroke-opacity="0.85"/>
    <circle cx="1318" cy="298" r="6" fill="#D94B4B"/>
    <text x="1335" y="305" class="pill" fill="#FF8A84">MADS team</text>
    <text x="874" y="372" class="cardTitle">PerFin OS</text>
    <rect x="874" y="397" width="68" height="5" rx="2.5" fill="#D94B4B"/>
    <text x="874" y="450" class="body">Personal-finance product across guest and</text>
    <text x="874" y="484" class="body">authenticated experiences.</text>
    <text x="874" y="532" class="small">• Session and authentication boundaries</text>
    <text x="874" y="564" class="small">• Firebase service architecture</text>
    <text x="874" y="596" class="small">• Theme systems, analytics, and privacy UX</text>
    <text x="874" y="628" class="small">• Yash Kanadhia · Alexis Gorospe · Sarmad Tariq</text>
  </g>

  <g>
    <line x1="86" y1="700" x2="1514" y2="700" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="86" y="728" class="small">Product design leads. Development and AI-assisted execution provide supporting proof.</text>
    <text x="1514" y="728" class="small" text-anchor="end">Toronto, Ontario, Canada</text>
  </g>
</svg>