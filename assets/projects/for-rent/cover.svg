      <stop offset="1" stop-color="#34403a"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#f8f6f1" stroke-opacity="0.045"/>
