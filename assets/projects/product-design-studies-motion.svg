<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700" role="img" aria-labelledby="motionTitle motionDesc">
<title id="motionTitle">Animated product design studies board</title>
<desc id="motionDesc">A slow animated Living Product Console board presenting Arthenticate and DriveDeal as Figma product design studies. Motion is decorative and the same content is available in the static product design studies SVG.</desc>
<defs>
  <clipPath id="frame"><rect width="1600" height="700" rx="34"/></clipPath>
  <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".075"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="9"/></filter>
</defs>
<image width="1600" height="700" href="data:image/svg+xml;base64,"/>
<g clip-path="url(#frame)">
  <rect x="-250" y="0" width="210" height="700" fill="url(#scan)"><animate attributeName="x" from="-250" to="1640" dur="10s" repeatCount="indefinite"/></rect>
  <rect x="86" y="230" width="680" height="380" rx="28" fill="none" stroke="#D05D66" stroke-width="3" opacity=".32"><animate attributeName="opacity" values=".3;.72;.3" dur="7.8s" repeatCount="indefinite"/></rect>
  <rect x="834" y="230" width="680" height="380" rx="28" fill="none" stroke="#7FA28D" stroke-width="3" opacity=".32"><animate attributeName="opacity" values=".3;.72;.3" dur="7.8s" begin="1.5s" repeatCount="indefinite"/></rect>
  <circle cx="144" cy="294" r="12" fill="none" stroke="#F08A91"><animate attributeName="r" values="12;30;12" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;.08;.7" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="892" cy="294" r="12" fill="none" stroke="#ABD0B9"><animate attributeName="r" values="12;30;12" dur="6s" begin="1.4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;.08;.7" dur="6s" begin="1.4s" repeatCount="indefinite"/></circle>
  <circle r="6" fill="#C4C85B" filter="url(#glow)"><animateMotion path="M86 646 H1514" dur="9s" repeatCount="indefinite"/></circle>
  <g fill="#C4C85B" transform="translate(1460 45)"><circle cx="0" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4.4s" repeatCount="indefinite"/></circle><circle cx="14" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4.4s" begin=".7s" repeatCount="indefinite"/></circle><circle cx="28" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4.4s" begin="1.4s" repeatCount="indefinite"/></circle><circle cx="42" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4.4s" begin="2.1s" repeatCount="indefinite"/></circle></g>
</g>
</svg>