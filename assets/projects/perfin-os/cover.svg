<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">PerFin OS project cover</title>
  <desc id="desc">Dark editorial project cover identifying PerFin OS as a React Native and Firebase MADS team project by Yash Kanadhia, Alexis Gorospe, and Sarmad Tariq.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121513"/>
      <stop offset="0.62" stop-color="#1f2521"/>
      <stop offset="1" stop-color="#30382f"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#f8f6f1" stroke-opacity="0.045"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="1335" cy="185" r="125" fill="#6b745e" fill-opacity="0.2" filter="url(#glow)"/>
  <circle cx="1335" cy="185" r="84" fill="none" stroke="#b9c3ad" stroke-width="2" stroke-opacity="0.55"/>
  <circle cx="1335" cy="185" r="28" fill="#ebf0e6" fill-opacity="0.9"/>
  <path d="M1280 185h110M1335 130v110" stroke="#ebf0e6" stroke-width="2" stroke-opacity="0.45"/>
  <rect x="88" y="78" width="1424" height="744" rx="34" fill="#0c0f0d" fill-opacity="0.38" stroke="#c9d2c2" stroke-opacity="0.2"/>
  <text x="138" y="150" fill="#b9c3ad" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" letter-spacing="4">BUILT PRODUCT · TEAM PROJECT</text>
  <text x="138" y="330" fill="#f8f6f1" font-family="Georgia, serif" font-size="126" font-weight="700">PerFin OS</text>
  <text x="144" y="410" fill="#d8ddd3" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="400">Personal-finance workflows across guest and authenticated experiences.</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600">
    <rect x="138" y="500" width="220" height="62" rx="31" fill="#ebf0e6" fill-opacity="0.12" stroke="#9aaa8e" stroke-opacity="0.48"/>
    <text x="182" y="540" fill="#f8f6f1">React Native</text>
    <rect x="382" y="500" width="170" height="62" rx="31" fill="#ebf0e6" fill-opacity="0.12" stroke="#9aaa8e" stroke-opacity="0.48"/>
    <text x="425" y="540" fill="#f8f6f1">Firebase</text>
    <rect x="576" y="500" width="286" height="62" rx="31" fill="#7b1d2c" fill-opacity="0.32" stroke="#b85c6c" stroke-opacity="0.62"/>
    <text x="619" y="540" fill="#fff4f5">MADS team project</text>
  </g>
  <path d="M138 648H1462" stroke="#f8f6f1" stroke-opacity="0.14"/>
  <text x="138" y="710" fill="#b9c3ad" font-family="Inter, system-ui, sans-serif" font-size="22" letter-spacing="2">TEAM</text>
  <text x="138" y="758" fill="#f8f6f1" font-family="Inter, system-ui, sans-serif" font-size="27">Yash Kanadhia · Alexis Gorospe · Sarmad Tariq</text>
  <text x="1360" y="758" text-anchor="end" fill="#b9c3ad" font-family="JetBrains Mono, monospace" font-size="20">CASE FILE 01</text>
</svg>
