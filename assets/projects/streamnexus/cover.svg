<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">StreamNexus project cover</title>
  <desc id="desc">Dark editorial project cover for StreamNexus, a full-stack streaming rental prototype using Node, Express, MongoDB, and simulated checkout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111313"/>
      <stop offset="0.6" stop-color="#202426"/>
      <stop offset="1" stop-color="#2e3938"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#f8f6f1" stroke-opacity="0.045"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect x="88" y="78" width="1424" height="744" rx="34" fill="#0c0f0d" fill-opacity="0.38" stroke="#c9d2c2" stroke-opacity="0.2"/>
  <g transform="translate(1200 130)">
    <rect x="0" y="0" width="260" height="176" rx="24" fill="none" stroke="#dce4d6" stroke-width="4" stroke-opacity="0.7"/>
    <path d="m102 52 80 36-80 36Z" fill="#9aaa8e" fill-opacity="0.85"/>
    <path d="M24 222h212M48 260h164" stroke="#dce4d6" stroke-width="4" stroke-linecap="round" stroke-opacity="0.38"/>
  </g>
  <text x="138" y="150" fill="#b9c3ad" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" letter-spacing="4">BUILT PRODUCT · FULL-STACK PROTOTYPE</text>
  <text x="138" y="330" fill="#f8f6f1" font-family="Georgia, serif" font-size="126" font-weight="700">StreamNexus</text>
  <text x="144" y="410" fill="#d8ddd3" font-family="Inter, system-ui, sans-serif" font-size="34">Role-based streaming rental workflows with inspectable system boundaries.</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600">
    <rect x="138" y="500" width="150" height="62" rx="31" fill="#ebf0e6" fill-opacity="0.12" stroke="#9aaa8e" stroke-opacity="0.48"/>
    <text x="182" y="540" fill="#f8f6f1">Node.js</text>
    <rect x="312" y="500" width="154" height="62" rx="31" fill="#ebf0e6" fill-opacity="0.12" stroke="#9aaa8e" stroke-opacity="0.48"/>
    <text x="349" y="540" fill="#f8f6f1">Express</text>
    <rect x="490" y="500" width="190" height="62" rx="31" fill="#ebf0e6" fill-opacity="0.12" stroke="#9aaa8e" stroke-opacity="0.48"/>
    <text x="528" y="540" fill="#f8f6f1">MongoDB</text>
    <rect x="704" y="500" width="286" height="62" rx="31" fill="#7b1d2c" fill-opacity="0.26" stroke="#b85c6c" stroke-opacity="0.55"/>
    <text x="744" y="540" fill="#fff4f5">Simulated checkout</text>
  </g>
  <path d="M138 648H1462" stroke="#f8f6f1" stroke-opacity="0.14"/>
  <text x="138" y="710" fill="#b9c3ad" font-family="Inter, system-ui, sans-serif" font-size="22" letter-spacing="2">EVIDENCE</text>
  <text x="138" y="758" fill="#f8f6f1" font-family="Inter, system-ui, sans-serif" font-size="27">Authentication · role authorization · tests · security middleware · CI</text>
  <text x="1360" y="758" text-anchor="end" fill="#b9c3ad" font-family="JetBrains Mono, monospace" font-size="20">CASE FILE 03</text>
