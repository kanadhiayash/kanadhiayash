<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Built product proof by Yash Kanadhia</title>
  <desc id="desc">A dark product board presenting For Rent, a SwiftUI rental marketplace, and StreamNexus, a full-stack streaming rental prototype.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090B0D"/>
      <stop offset="1" stop-color="#12161A"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131716"/>
      <stop offset="1" stop-color="#1B2521"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12161B"/>
      <stop offset="1" stop-color="#18202B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#FFFFFF" stroke-opacity="0.025"/>
    </pattern>
    <style>
      .eyebrow{font:600 22px Arial,sans-serif;letter-spacing:3px;text-transform:uppercase}
      .title{font:700 52px Georgia,serif;fill:#F5F2EA}
      .cardTitle{font:700 40px Georgia,serif;fill:#F5F2EA}
      .body{font:400 23px Arial,sans-serif;fill:#C9C8C2}
      .small{font:500 19px Arial,sans-serif;fill:#A6AAA3}
      .pill{font:600 18px Arial,sans-serif}
    </style>
  </defs>
  <rect width="1600" height="720" rx="34" fill="url(#bg)"/>
  <rect width="1600" height="720" rx="34" fill="url(#grid)"/>
  <rect x="18" y="18" width="1564" height="684" rx="28" fill="none" stroke="#73756F" stroke-opacity="0.42"/>

  <text x="86" y="88" class="eyebrow" fill="#A8AC58">Living Product Console</text>
  <text x="86" y="148" class="title">Built product proof</text>
  <text x="86" y="188" class="small">Native mobile and full-stack product implementation, documented with explicit limits.</text>

  <g filter="url(#shadow)">
    <rect x="86" y="230" width="680" height="404" rx="28" fill="url(#cardA)" stroke="#6FA58A" stroke-opacity="0.7"/>
    <rect x="834" y="230" width="680" height="404" rx="28" fill="url(#cardB)" stroke="#6E8FB8" stroke-opacity="0.7"/>
  </g>

  <g>
    <circle cx="144" cy="294" r="24" fill="#6FA58A" fill-opacity="0.15" stroke="#6FA58A"/>
    <path d="M132 300h24v-14h-24zM136 286v-8h16v8M138 306h12" fill="none" stroke="#9FD0B7" stroke-width="2" stroke-linecap="round"/>
    <rect x="579" y="265" width="135" height="42" rx="21" fill="#6FA58A" fill-opacity="0.1" stroke="#6FA58A"/>
    <text x="646" y="293" class="pill" fill="#A7D8C0" text-anchor="middle">SwiftUI</text>
    <text x="126" y="358" class="cardTitle">For Rent</text>
    <rect x="126" y="383" width="68" height="5" rx="2.5" fill="#6FA58A"/>
    <text x="126" y="436" class="body">Long-term rental marketplace for Canadian</text>
    <text x="126" y="469" class="body">renters, landlords, and guests.</text>
    <text x="126" y="516" class="small">• Role-based renter and landlord journeys</text>
    <text x="126" y="548" class="small">• Feature-oriented MVVM and Firebase boundaries</text>
    <text x="126" y="580" class="small">• Dynamic Type, Reduce Motion, and explicit states</text>
    <text x="126" y="612" class="small">• Automated iOS, Firebase, and secrets checks</text>
  </g>

  <g>
    <circle cx="892" cy="294" r="24" fill="#6E8FB8" fill-opacity="0.15" stroke="#6E8FB8"/>
    <path d="M880 284h24v20h-24zM886 290l10 4-10 4z" fill="none" stroke="#9DBCE2" stroke-width="2" stroke-linejoin="round"/>
    <rect x="1311" y="265" width="158" height="42" rx="21" fill="#6E8FB8" fill-opacity="0.1" stroke="#6E8FB8"/>
    <text x="1390" y="293" class="pill" fill="#A9C4E5" text-anchor="middle">Full stack</text>
    <text x="874" y="358" class="cardTitle">StreamNexus</text>
    <rect x="874" y="383" width="68" height="5" rx="2.5" fill="#6E8FB8"/>
    <text x="874" y="436" class="body">Streaming-rental prototype with separate</text>
    <text x="874" y="469" class="body">admin and streamer journeys.</text>
    <text x="874" y="516" class="small">• Session authentication and role authorization</text>
    <text x="874" y="548" class="small">• Express, MongoDB, EJS, and service boundaries</text>
    <text x="874" y="580" class="small">• Security middleware, integration tests, and CI</text>
    <text x="874" y="612" class="small">• Simulated checkout and rental completion only</text>
  </g>

  <line x1="86" y1="672" x2="1514" y2="672" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="86" y="700" class="small">Static system media. Verified screenshots and recordings remain a separate capture task.</text>
  <text x="1514" y="700" class="small" text-anchor="end">No deployment or production-use claims.</text>
</svg>