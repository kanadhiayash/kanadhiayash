<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="motionTitle motionDesc">
<title id="motionTitle">Animated flagship systems board</title>
<desc id="motionDesc">A slow animated Living Product Console board presenting Zeref Memory Engine as an independent project and PerFin OS as a MADS team project. Motion is decorative and the same content is available in the static flagship systems SVG.</desc>
<defs>
  <clipPath id="frame"><rect width="1600" height="760" rx="34"/></clipPath>
  <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".08"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="10"/></filter>
</defs>
<image width="1600" height="760" href="data:image/svg+xml;base64,"/>
<g clip-path="url(#frame)">
  <rect x="-260" y="0" width="220" height="760" fill="url(#scan)"><animate attributeName="x" from="-260" to="1640" dur="9s" repeatCount="indefinite"/></rect>
  <rect x="86" y="242" width="680" height="410" rx="28" fill="none" stroke="#A8AC58" stroke-width="3" opacity=".32"><animate attributeName="opacity" values=".28;.72;.28" dur="7s" repeatCount="indefinite"/></rect>
  <rect x="834" y="242" width="680" height="410" rx="28" fill="none" stroke="#D94B4B" stroke-width="3" opacity=".32"><animate attributeName="opacity" values=".32;.72;.32" dur="7s" begin="1.4s" repeatCount="indefinite"/></rect>
  <circle cx="144" cy="306" r="12" fill="none" stroke="#DDE18B" opacity=".65"><animate attributeName="r" values="12;31;12" dur="5.5s" repeatCount="indefinite"/><animate attributeName="opacity" values=".72;.08;.72" dur="5.5s" repeatCount="indefinite"/></circle>
  <circle cx="892" cy="306" r="12" fill="none" stroke="#FF7770" opacity=".65"><animate attributeName="r" values="12;31;12" dur="5.5s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".72;.08;.72" dur="5.5s" begin="1.2s" repeatCount="indefinite"/></circle>
  <circle r="6" fill="#C4C85B" filter="url(#glow)"><animateMotion path="M86 700 H1514" dur="8s" repeatCount="indefinite"/></circle>
  <g fill="#C4C85B" transform="translate(1460 48)"><circle cx="0" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4s" repeatCount="indefinite"/></circle><circle cx="14" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4s" begin=".6s" repeatCount="indefinite"/></circle><circle cx="28" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4s" begin="1.2s" repeatCount="indefinite"/></circle><circle cx="42" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4s" begin="1.8s" repeatCount="indefinite"/></circle></g>
</g>
</svg>