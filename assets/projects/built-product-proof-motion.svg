<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="motionTitle motionDesc">
<title id="motionTitle">Animated built product proof board</title>
<desc id="motionDesc">A slow animated Living Product Console board presenting For Rent and StreamNexus. Motion is decorative and the same content is available in the static built product proof SVG.</desc>
<defs>
  <clipPath id="frame"><rect width="1600" height="720" rx="34"/></clipPath>
  <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".075"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="9"/></filter>
</defs>
<image width="1600" height="720" href="data:image/svg+xml;base64,"/>
<g clip-path="url(#frame)">
  <rect x="-250" y="0" width="210" height="720" fill="url(#scan)"><animate attributeName="x" from="-250" to="1640" dur="9.5s" repeatCount="indefinite"/></rect>
  <rect x="86" y="230" width="680" height="404" rx="28" fill="none" stroke="#6FA58A" stroke-width="3" opacity=".32"><animate attributeName="opacity" values=".3;.7;.3" dur="7.5s" repeatCount="indefinite"/></rect>
  <rect x="834" y="230" width="680" height="404" rx="28" fill="none" stroke="#6E8FB8" stroke-width="3" opacity=".32"><animate attributeName="opacity" values=".3;.7;.3" dur="7.5s" begin="1.6s" repeatCount="indefinite"/></rect>
  <circle cx="144" cy="294" r="12" fill="none" stroke="#9FD0B7"><animate attributeName="r" values="12;30;12" dur="5.8s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;.08;.7" dur="5.8s" repeatCount="indefinite"/></circle>
  <circle cx="892" cy="294" r="12" fill="none" stroke="#9DBCE2"><animate attributeName="r" values="12;30;12" dur="5.8s" begin="1.3s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;.08;.7" dur="5.8s" begin="1.3s" repeatCount="indefinite"/></circle>
  <circle r="6" fill="#C4C85B" filter="url(#glow)"><animateMotion path="M86 672 H1514" dur="8.5s" repeatCount="indefinite"/></circle>
  <g fill="#C4C85B" transform="translate(1460 46)"><circle cx="0" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4.2s" repeatCount="indefinite"/></circle><circle cx="14" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4.2s" begin=".7s" repeatCount="indefinite"/></circle><circle cx="28" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4.2s" begin="1.4s" repeatCount="indefinite"/></circle><circle cx="42" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="4.2s" begin="2.1s" repeatCount="indefinite"/></circle></g>
</g>
</svg>