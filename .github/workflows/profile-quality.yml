name: Profile Quality Gate

on:
  pull_request:
    paths:
      - "README.md"
      - "assets/**"
      - "data/**"
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profile-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check patch whitespace
        run: git diff --check HEAD^ HEAD || true

      - name: Compile profile scripts
        run: |
          python3 -m py_compile scripts/update_dynamic_modules.py
          python3 -m py_compile scripts/validate_profile_release.py

      - name: Validate controlled dynamic modules
        run: python3 scripts/update_dynamic_modules.py --check

      - name: Validate profile release contract
        run: python3 scripts/validate_profile_release.py

  online-link-gate:
    needs: static-release-gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate definitive external link failures
        run: python3 scripts/validate_profile_release.py --online
