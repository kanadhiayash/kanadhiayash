name: Profile Quality Gate

on:
  pull_request:
    paths:
      - "README.md"
      - "assets/hero/**"
      - ".github/workflows/profile-quality.yml"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profile-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Check whitespace
        run: git diff --check

      - name: Validate README and hero assets
        shell: python
        run: |
          from pathlib import Path
          import xml.etree.ElementTree as ET

          root = Path('.')
          readme = (root / 'README.md').read_text(encoding='utf-8')
          motion = root / 'assets/hero/yash-kanadhia-alientech-v2-motion.svg'
          static = root / 'assets/hero/yash-kanadhia-alientech-v2-static.svg'

          required_refs = (
              './assets/hero/yash-kanadhia-alientech-v2-motion.svg?rev=20260712-2',
              './assets/hero/yash-kanadhia-alientech-v2-static.svg?rev=20260712-2',
          )
          for ref in required_refs:
              if readme.count(ref) != 1:
                  raise SystemExit(f'README must reference {ref} exactly once')

          for path, animated in ((motion, True), (static, False)):
              if not path.is_file() or path.stat().st_size == 0:
                  raise SystemExit(f'Missing hero asset: {path}')
              ET.parse(path)
              text = path.read_text(encoding='utf-8').lower()
              for token in ('<script', 'javascript:', '<foreignobject', 'onload=', 'onclick='):
                  if token in text:
                      raise SystemExit(f'Unsafe SVG token {token} in {path}')
              for required in ('role="img"', 'viewbox=', '<title', '<desc'):
                  if required not in text:
                      raise SystemExit(f'Missing {required} in {path}')
              if animated and 'prefers-reduced-motion' not in text:
                  raise SystemExit(f'Missing reduced-motion support in {path}')

          print('Profile hero and README references are valid.')
